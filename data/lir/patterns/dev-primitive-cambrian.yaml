# Developer Primitive Cambrian Explosion Pattern
# Typical trajectory: A new platform capability triggers a wave of
# new tools, libraries, and frameworks.
#
# Example: React ecosystem, LLM tooling (LangChain, etc.), WebAssembly
# Lead time: ~12-18 months from first framework to ecosystem maturity.

pattern_id: dev-primitive-cambrian
name: Developer Primitive Cambrian Explosion
description: >
  A new platform primitive or API capability triggers rapid creation
  of developer tools, frameworks, and libraries. Characterized by
  sudden appearance of many competing implementations, followed
  by consolidation around winners.

duration_weeks: 52  # ~12 months
expected_ring: trial
consensus_week: 40
tags:
  - Developer Tools
  - Frameworks
  - MLOps

