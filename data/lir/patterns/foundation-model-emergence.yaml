# Foundation Model Emergence Pattern
# Typical trajectory: academic papers → open-source implementations →
# community experimentation → mainstream adoption.
#
# Example: GPT-series, BERT, Stable Diffusion
# Lead time: ~18-24 months from first academic signals to mainstream.

pattern_id: foundation-model-emergence
name: Foundation Model Emergence
description: >
  Academic research on a new model architecture or training paradigm
  starts with a trickle of papers, accelerates as open-source
  implementations appear, and explodes when community adoption begins.
  Characterized by a slow ramp followed by exponential growth.

duration_weeks: 78  # ~18 months
expected_ring: assess
consensus_week: 60  # Mainstream awareness typically around week 60
tags:
  - NLP
  - Computer Vision
  - Foundation Models

