# Protocol Standardization Pattern
# Typical trajectory: Industry need → draft proposals → working groups →
# reference implementations → formal standard → widespread adoption.
#
# Example: HTTP/2, WebAssembly, WebRTC, OAuth 2.0
# Lead time: ~24-36 months from first drafts to formal standard.

pattern_id: protocol-standardization
name: Protocol Standardization
description: >
  A technology need drives creation of formal standards through W3C,
  IETF, or similar bodies. Slow, steady growth through draft phases,
  with a step function when reference implementations ship and
  another when the standard is formally ratified.

duration_weeks: 104  # ~24 months
expected_ring: assess
consensus_week: 80
tags:
  - Standards
  - Protocols
  - Infrastructure

# Weekly signal counts (normalized, oldest first)
# Phase 1 (weeks 1-25): Draft proposals, working group formation
# Phase 2 (weeks 26-50): Active drafting, reference implementations
# Phase 3 (weeks 51-80): Implementation experience, revisions
# Phase 4 (weeks 81-104): Ratification, early adoption
